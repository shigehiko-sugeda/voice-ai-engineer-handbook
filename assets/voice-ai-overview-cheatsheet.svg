<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">車載音声認識システム 全体像マップ</title>
  <desc id="desc">音声入力から車両制御までの全体フロー、構成要素、横断機能、評価・認証・運用観点を1枚で俯瞰するチートシート。</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.title{font:700 30px sans-serif;fill:#0f2a52}.subtitle{font:700 14px sans-serif;fill:#1f2937}.h{font:700 17px sans-serif;fill:#0f172a}.small{font:12px sans-serif;fill:#111827}.tiny{font:11px sans-serif;fill:#334155}.label{font:700 18px sans-serif;fill:#fff}.num{font:700 44px sans-serif;fill:#fff}.arrow{stroke:#0f2a52;stroke-width:3;marker-end:url(#arrow)}.dash{stroke:#0f2a52;stroke-width:2;stroke-dasharray:5 5;fill:none}.muted{fill:#475569}.green{fill:#eef8ef;stroke:#90c695}.blue{fill:#eef6ff;stroke:#8eb9e8}.purple{fill:#f4f0ff;stroke:#b6a4e8}.orange{fill:#fff7ed;stroke:#f0b36d}.red{fill:#fff1f2;stroke:#e9a0af}.teal{fill:#effdf8;stroke:#7fc6be}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#0f2a52"/></marker>
  </defs>
  <rect class="bg" width="1600" height="920"/>
  <text x="28" y="42" class="title">車載音声認識システム 全体像マップ（1枚チートシート）</text>
  <text x="860" y="42" class="subtitle">音声入力から車両制御までの全体フローと、設計・実装で意識すべき重要ポイントの俯瞰図</text>

  <rect x="14" y="82" width="122" height="235" rx="10" fill="#2f6fa8"/><text x="63" y="150" text-anchor="middle" class="num">1</text><text x="75" y="194" text-anchor="middle" class="label">理解の流れ</text><text x="75" y="226" text-anchor="middle" class="label" font-size="15">音声が処理</text><text x="75" y="250" text-anchor="middle" class="label" font-size="15">される流れ</text>
  <g transform="translate(150 88)">
    <rect class="panel" width="1410" height="220" rx="10"/>
    <g transform="translate(18 24)">
      <rect class="panel" width="160" height="160" rx="8"/><text x="80" y="28" text-anchor="middle" class="h">音声入力</text><text x="80" y="76" text-anchor="middle" font-size="42">🎙️</text><text x="80" y="112" text-anchor="middle" class="tiny">ユーザーの発話を</text><text x="80" y="132" text-anchor="middle" class="tiny">マイクで収音</text>
      <line x1="165" y1="80" x2="193" y2="80" class="arrow"/>
      <g transform="translate(200 0)"><rect class="panel green" width="160" height="160" rx="8"/><text x="80" y="28" text-anchor="middle" class="h">Wake Word</text><text x="80" y="76" text-anchor="middle" font-size="42">👂</text><text x="80" y="112" text-anchor="middle" class="tiny">ホットワード検出</text><text x="80" y="132" text-anchor="middle" class="tiny">例: Hey Siri / OK Google</text></g>
      <line x1="365" y1="80" x2="393" y2="80" class="arrow"/>
      <g transform="translate(400 0)"><rect class="panel blue" width="160" height="160" rx="8"/><text x="80" y="28" text-anchor="middle" class="h">ASR</text><text x="80" y="52" text-anchor="middle" class="tiny">（音声認識）</text><text x="80" y="90" text-anchor="middle" font-size="40">📄</text><text x="80" y="124" text-anchor="middle" class="tiny">音声をテキストに変換</text></g>
      <line x1="565" y1="80" x2="593" y2="80" class="arrow"/>
      <g transform="translate(600 0)"><rect class="panel purple" width="160" height="160" rx="8"/><text x="80" y="28" text-anchor="middle" class="h">NLU</text><text x="80" y="52" text-anchor="middle" class="tiny">（意味理解）</text><text x="80" y="90" text-anchor="middle" font-size="40">🧠</text><text x="80" y="124" text-anchor="middle" class="tiny">Intent / Slotを理解</text></g>
      <line x1="765" y1="80" x2="793" y2="80" class="arrow"/>
      <g transform="translate(800 0)"><rect class="panel orange" width="160" height="160" rx="8"/><text x="80" y="28" text-anchor="middle" class="h">Dialog Manager</text><text x="80" y="52" text-anchor="middle" class="tiny">（対話管理）</text><text x="80" y="90" text-anchor="middle" font-size="40">💬</text><text x="80" y="124" text-anchor="middle" class="tiny">会話状態を管理</text></g>
      <line x1="965" y1="80" x2="993" y2="80" class="arrow"/>
      <g transform="translate(1000 0)"><rect class="panel red" width="160" height="160" rx="8"/><text x="80" y="28" text-anchor="middle" class="h">Skill / Domain</text><text x="80" y="52" text-anchor="middle" class="tiny">（機能・ドメイン）</text><text x="80" y="90" text-anchor="middle" font-size="40">▦</text><text x="80" y="124" text-anchor="middle" class="tiny">ナビ・音楽・空調など</text></g>
      <line x1="1165" y1="80" x2="1193" y2="80" class="arrow"/>
      <g transform="translate(1200 0)"><rect class="panel teal" width="160" height="160" rx="8"/><text x="80" y="28" text-anchor="middle" class="h">Vehicle API</text><text x="80" y="52" text-anchor="middle" class="tiny">（車両連携）</text><text x="80" y="90" text-anchor="middle" font-size="40">🚗</text><text x="80" y="124" text-anchor="middle" class="tiny">車両機能を制御</text></g>
      <line x1="1365" y1="80" x2="1393" y2="80" class="arrow"/>
    </g>
    <path d="M1398 184 H80 V166" class="dash"/><text x="730" y="198" text-anchor="middle" class="small">ユーザーの次の発話（または要求）</text>
  </g>

  <rect x="14" y="334" width="122" height="170" rx="10" fill="#438a4f"/><text x="63" y="394" text-anchor="middle" class="num">2</text><text x="75" y="436" text-anchor="middle" class="label">構成要素</text><text x="75" y="466" text-anchor="middle" class="label" font-size="15">各モジュール</text><text x="75" y="488" text-anchor="middle" class="label" font-size="15">の役割</text>
  <g transform="translate(150 336)">
    <rect class="panel" width="160" height="158" rx="8"/><text x="15" y="28" class="small">・マイクアレイ</text><text x="15" y="55" class="small">・AEC / NS / AGC</text><text x="15" y="82" class="small">・ビームフォーミング</text><text x="15" y="109" class="small">・音声ルーティング</text>
    <g transform="translate(175 0)"><rect class="panel green" width="160" height="158" rx="8"/><text x="15" y="28" class="small">・常時リスニング</text><text x="15" y="55" class="small">・Keyword Spotting</text><text x="15" y="82" class="small">・False / Miss Wake</text><text x="15" y="109" class="small">・低消費電力処理</text></g>
    <g transform="translate(350 0)"><rect class="panel blue" width="160" height="158" rx="8"/><text x="15" y="28" class="small">・音響モデル / LM</text><text x="15" y="55" class="small">・Streaming ASR</text><text x="15" y="82" class="small">・Endpoint検出</text><text x="15" y="109" class="small">・信頼度</text></g>
    <g transform="translate(525 0)"><rect class="panel purple" width="160" height="158" rx="8"/><text x="15" y="28" class="small">・Intent検出</text><text x="15" y="55" class="small">・Slot抽出</text><text x="15" y="82" class="small">・Context利用</text><text x="15" y="109" class="small">・Confidence / Fallback</text></g>
    <g transform="translate(700 0)"><rect class="panel orange" width="160" height="158" rx="8"/><text x="15" y="28" class="small">・状態管理</text><text x="15" y="55" class="small">・Session管理</text><text x="15" y="82" class="small">・確認 / 曖昧性解消</text><text x="15" y="109" class="small">・Timeout / 復帰</text></g>
    <g transform="translate(875 0)"><rect class="panel red" width="160" height="158" rx="8"/><text x="15" y="28" class="small">・Navigation</text><text x="15" y="55" class="small">・Phone / Media</text><text x="15" y="82" class="small">・Climate / Settings</text><text x="15" y="109" class="small">・外部連携</text></g>
    <g transform="translate(1050 0)"><rect class="panel teal" width="160" height="158" rx="8"/><text x="15" y="28" class="small">・車両ネットワークI/O</text><text x="15" y="55" class="small">・CAN / LIN / Ethernet</text><text x="15" y="82" class="small">・権限制御</text><text x="15" y="109" class="small">・エラー処理 / Retry</text></g>
    <g transform="translate(1225 0)"><rect class="panel" width="160" height="158" rx="8"/><text x="15" y="28" class="small">・テキスト正規化</text><text x="15" y="55" class="small">・Neural TTS</text><text x="15" y="82" class="small">・話者/トーン制御</text><text x="15" y="109" class="small">・Barge-in対応</text></g>
  </g>

  <rect x="14" y="520" width="122" height="132" rx="10" fill="#f2994a"/><text x="63" y="570" text-anchor="middle" class="num">3</text><text x="75" y="606" text-anchor="middle" class="label">横断的な</text><text x="75" y="630" text-anchor="middle" class="label">仕組み</text>
  <g transform="translate(150 520)">
    <rect class="panel" width="315" height="124" rx="8"/><text x="20" y="30" class="h">🔊 Audio Focus / Arbitration</text><text x="20" y="60" class="small">・自社 / Siri / Google Assistant の共存制御</text><text x="20" y="86" class="small">・ナビ案内、通話、音楽との優先制御</text><text x="20" y="112" class="small">・Barge-in と復帰制御</text>
    <g transform="translate(335 0)"><rect class="panel" width="285" height="124" rx="8"/><text x="20" y="30" class="h">🗄 Session / Context管理</text><text x="20" y="60" class="small">・対話履歴の保持</text><text x="20" y="86" class="small">・「もう少し下げて」の文脈利用</text><text x="20" y="112" class="small">・複数セッション管理</text></g>
    <g transform="translate(640 0)"><rect class="panel" width="285" height="124" rx="8"/><text x="20" y="30" class="h">⚠ Error Handling / Fallback</text><text x="20" y="60" class="small">・認識失敗時の再プロンプト</text><text x="20" y="86" class="small">・通信異常時の代替動作</text><text x="20" y="112" class="small">・安全優先の設計</text></g>
    <g transform="translate(945 0)"><rect class="panel" width="245" height="124" rx="8"/><text x="20" y="30" class="h">🔒 Security / Privacy</text><text x="20" y="60" class="small">・マイク制御</text><text x="20" y="86" class="small">・通信安全化</text><text x="20" y="112" class="small">・個人情報の取り扱い</text></g>
    <g transform="translate(1210 0)"><rect class="panel" width="175" height="124" rx="8"/><text x="20" y="30" class="h">📊 ログ / 診断</text><text x="20" y="60" class="small">・音声/認識ログ</text><text x="20" y="86" class="small">・性能監視</text><text x="20" y="112" class="small">・Remote診断</text></g>
  </g>

  <rect x="14" y="670" width="122" height="180" rx="10" fill="#8f65bd"/><text x="63" y="740" text-anchor="middle" class="num">4</text><text x="75" y="782" text-anchor="middle" class="label">評価・認証</text><text x="75" y="806" text-anchor="middle" class="label">運用</text>
  <g transform="translate(150 670)">
    <rect class="panel" width="340" height="150" rx="8"/><text x="110" y="30" class="h">主な評価指標</text><text x="20" y="65" class="small">WER / Intent Accuracy / Slot F1</text><text x="20" y="95" class="small">Latency / False Wake Rate</text><text x="20" y="125" class="small">CPU / Memory 使用率</text>
    <g transform="translate(360 0)"><rect class="panel" width="470" height="150" rx="8"/><text x="190" y="30" class="h">代表的な利用シナリオ</text><text x="25" y="70" class="small">ナビ設定　エアコン操作　音楽再生　電話発信　情報検索</text><text x="25" y="105" class="tiny">「自宅に帰る」 / 「22度にして」 / 「○○をかけて」 / 「田中さんに電話して」</text></g>
    <g transform="translate(850 0)"><rect class="panel" width="360" height="150" rx="8"/><text x="55" y="30" class="h">認証・適合で見られるポイント</text><text x="20" y="60" class="small">✓ Siri / Google Assistant の正しい起動</text><text x="20" y="84" class="small">✓ Audio Focus / Mic Routing</text><text x="20" y="108" class="small">✓ Latency / Timeout / 復帰動作</text><text x="20" y="132" class="small">✓ エラー時のユーザー体験</text></g>
    <g transform="translate(1230 0)"><rect class="panel" width="155" height="150" rx="8"/><text x="20" y="30" class="h">外部連携</text><text x="18" y="64" class="small">CarPlay</text><text x="18" y="88" class="small">Android Auto</text><text x="18" y="112" class="small">クラウド</text><text x="18" y="136" class="small">車両システム</text></g>
  </g>

  <rect x="150" y="838" width="710" height="58" rx="8" class="panel"/><text x="170" y="866" class="h">用語ミニ辞典</text><text x="170" y="888" class="tiny">ASR: 音声認識　NLU: 意味理解　TTS: 音声合成　Intent: ユーザーの意図　Slot: 意図に含まれる値　Context: 会話文脈　Barge-in: 割り込み発話</text>
  <rect x="880" y="838" width="680" height="58" rx="8" class="panel"/><text x="1100" y="862" text-anchor="middle" class="h">設計の基本原則</text><text x="930" y="888" class="small">安全性最優先　使いやすさ　応答性　信頼性　拡張性</text>
  <text x="28" y="910" class="tiny">※この図は全体像の俯瞰を目的としたチートシートです。詳細は各章のドキュメントを参照してください。</text><text x="1390" y="910" class="tiny">Voice AI Engineer Handbook</text>
</svg>
